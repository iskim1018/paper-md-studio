pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: "*.{ts,tsx,js,jsx,json}"
      run: pnpm biome check --no-errors-on-unmatched {staged_files}

    - name: typecheck
      run: pnpm build && pnpm -r typecheck

commit-msg:
  jobs:
    - name: conventional-commit
      run: |
        MSG=$(head -1 {1})
        if ! echo "$MSG" | grep -qE '^(feat|fix|docs|style|refactor|test|chore|build|ci|perf|revert)(\(.+\))?: .+'; then
          echo "커밋 메시지가 Conventional Commits 형식이 아닙니다."
          echo "형식: <type>(<scope>): <설명>"
          echo "예시: feat(core): HWPX 파서 구현"
          exit 1
        fi
