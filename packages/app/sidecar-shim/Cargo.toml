[package]
name = "paper-md-studio-cli-shim"
version = "0.1.1"
description = "Tauri sidecar shim for paper-md-studio CLI on Windows (PE32+ binary)"
authors = ["Insung Kim"]
license = "MIT"
repository = "https://github.com/iskim/paper-md-studio"
edition = "2024"

[[bin]]
name = "paper-md-studio-cli-shim"
path = "src/main.rs"

[dependencies]
flate2 = "1"
tar = "0.4"
anyhow = "1"

[profile.release]
lto = true
strip = true
codegen-units = 1
panic = "abort"
opt-level = "z"

[workspace]
