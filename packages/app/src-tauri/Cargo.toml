[package]
name = "paper-md-studio"
version = "0.1.0"
description = "HWP/HWPX/DOCX/PDF 문서를 Markdown으로 변환하는 macOS/Windows 데스크톱 앱"
authors = ["Insung Kim"]
edition = "2024"

[lib]
name = "paper_md_studio_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
