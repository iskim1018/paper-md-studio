[package]
name = "docs-to-md"
version = "0.1.0"
description = "macOS 문서 변환 도구"
authors = ["Insung Kim"]
edition = "2024"

[lib]
name = "docs_to_md_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
